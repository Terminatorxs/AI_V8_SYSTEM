<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>家庭模式 - EdgeVision</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="topbar">
    <div class="brand">
        <div class="brand-icon">🏠</div>
        <div>
            <div class="brand-title">家庭智能看护模式</div>
            <div class="brand-subtitle">Elderly Care · Stranger Alarm · Pet Detection · Fall Detection</div>
        </div>
    </div>
    <div class="top-right">
        <span>ONLINE</span>
        <a href="/dashboard">返回控制台</a>
    </div>
</div>

<div class="layout">
    <aside class="sidebar">
        <a href="/dashboard">🏠 控制中心</a>
        <a href="/mall">🏬 商场模式</a>
        <a href="/restricted">🚨 禁区模式</a>
        <a href="/campus">🏫 校园模式</a>
        <a href="/factory">🏭 工厂模式</a>
        <a href="/parking">🚗 停车场</a>
        <a href="/warehouse">📦 仓库模式</a>
        <a class="active" href="/home">🏠 家庭模式</a>
    </aside>

    <main class="main">
        <section class="hero">
            <div>
                <h1>🏠 家庭智能看护中心</h1>
                <p>老人跌倒、陌生人闯入、儿童看护、宠物检测、烟火预警</p>
            </div>
            <div class="mode-badge">当前模式：家庭</div>
        </section>

        <section class="dashboard-grid">
            <div class="video-panel">
                <div class="panel-title">
                    <h2>家庭实时监控</h2>
                    <span>LIVE CAMERA</span>
                </div>
                <div class="video-shell">
                    <img src="/video" class="video">
                </div>
            </div>

            <div class="side-panel">
                <div class="panel-title">
                    <h2>家庭模式功能</h2>
                    <span>HOME MODULES</span>
                </div>
                <div class="info-list">
                    <div><span>人员检测</span><b>已支持</b></div>
                    <div><span>陌生人报警</span><b>预留</b></div>
                    <div><span>老人跌倒</span><b>预留</b></div>
                    <div><span>宠物检测</span><b>预留</b></div>
                    <div><span>烟火预警</span><b>预留</b></div>
                </div>
                <div class="alert-box">✅ 家庭看护模式运行中</div>
            </div>
        </section>
    </main>
</div>

</body>
</html>
