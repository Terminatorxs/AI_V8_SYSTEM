<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>停车场模式 - EdgeVision</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="topbar">
    <div class="brand">
        <div class="brand-icon">🚗</div>
        <div>
            <div class="brand-title">停车场智能管理模式</div>
            <div class="brand-subtitle">License Plate OCR · Parking Space · Vehicle Count</div>
        </div>
    </div>
    <div class="top-right">
        <span>ONLINE</span>
        <a href="/dashboard">返回控制台</a>
    </div>
</div>

<div class="layout">
    <aside class="sidebar">
        <a href="/dashboard">🏠 控制中心</a>
        <a href="/mall">🏬 商场模式</a>
        <a href="/restricted">🚨 禁区模式</a>
        <a href="/campus">🏫 校园模式</a>
        <a href="/factory">🏭 工厂模式</a>
        <a class="active" href="/parking">🚗 停车场</a>
        <a href="/warehouse">📦 仓库模式</a>
        <a href="/home">🏠 家庭模式</a>
    </aside>

    <main class="main">
        <section class="hero">
            <div>
                <h1>🚗 停车场智能管理中心</h1>
                <p>车辆检测、车牌识别、车位统计、逆行检测、违停报警</p>
            </div>
            <div class="mode-badge">当前模式：停车场</div>
        </section>

        <section class="dashboard-grid">
            <div class="video-panel">
                <div class="panel-title">
                    <h2>停车场实时监控</h2>
                    <span>LIVE CAMERA</span>
                </div>
                <div class="video-shell">
                    <img src="/video" class="video">
                </div>
            </div>

            <div class="side-panel">
                <div class="panel-title">
                    <h2>停车场模式功能</h2>
                    <span>PARKING MODULES</span>
                </div>
                <div class="info-list">
                    <div><span>车辆检测</span><b>预留</b></div>
                    <div><span>车牌OCR</span><b>预留</b></div>
                    <div><span>车位统计</span><b>预留</b></div>
                    <div><span>逆行检测</span><b>预留</b></div>
                    <div><span>违停报警</span><b>预留</b></div>
                </div>
                <div class="alert-box">✅ 停车场模式运行中</div>
            </div>
        </section>
    </main>
</div>

</body>
</html>
