<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>仓库模式 - EdgeVision</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="topbar">
    <div class="brand">
        <div class="brand-icon">📦</div>
        <div>
            <div class="brand-title">仓库智能巡检模式</div>
            <div class="brand-subtitle">Forklift · Inventory · Fire Detection · Restricted Area</div>
        </div>
    </div>
    <div class="top-right">
        <span>ONLINE</span>
        <a href="/dashboard">返回控制台</a>
    </div>
</div>

<div class="layout">
    <aside class="sidebar">
        <a href="/dashboard">🏠 控制中心</a>
        <a href="/mall">🏬 商场模式</a>
        <a href="/restricted">🚨 禁区模式</a>
        <a href="/campus">🏫 校园模式</a>
        <a href="/factory">🏭 工厂模式</a>
        <a href="/parking">🚗 停车场</a>
        <a class="active" href="/warehouse">📦 仓库模式</a>
        <a href="/home">🏠 家庭模式</a>
    </aside>

    <main class="main">
        <section class="hero">
            <div>
                <h1>📦 仓库智能巡检中心</h1>
                <p>人员进入、叉车检测、货物识别、烟火预警、危险区域报警</p>
            </div>
            <div class="mode-badge">当前模式：仓库</div>
        </section>

        <section class="dashboard-grid">
            <div class="video-panel">
                <div class="panel-title">
                    <h2>仓库实时监控</h2>
                    <span>LIVE CAMERA</span>
                </div>
                <div class="video-shell">
                    <img src="/video" class="video">
                </div>
            </div>

            <div class="side-panel">
                <div class="panel-title">
                    <h2>仓库模式功能</h2>
                    <span>WAREHOUSE MODULES</span>
                </div>
                <div class="info-list">
                    <div><span>人员进入</span><b>已支持</b></div>
                    <div><span>危险区域</span><b>已支持</b></div>
                    <div><span>叉车检测</span><b>预留</b></div>
                    <div><span>烟火检测</span><b>预留</b></div>
                    <div><span>货物统计</span><b>预留</b></div>
                </div>
                <div class="alert-box warning">⚠ 仓库巡检模式已启用</div>
            </div>
        </section>
    </main>
</div>

</body>
</html>
