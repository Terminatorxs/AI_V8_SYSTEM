<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>工厂模式 - EdgeVision</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="topbar">
    <div class="brand">
        <div class="brand-icon">🏭</div>
        <div>
            <div class="brand-title">工厂安全生产模式</div>
            <div class="brand-subtitle">Helmet Detection · Smoke Alarm · Danger Zone</div>
        </div>
    </div>
    <div class="top-right">
        <span>ONLINE</span>
        <a href="/dashboard">返回控制台</a>
    </div>
</div>

<div class="layout">
    <aside class="sidebar">
        <a href="/dashboard">🏠 控制中心</a>
        <a href="/mall">🏬 商场模式</a>
        <a href="/restricted">🚨 禁区模式</a>
        <a href="/campus">🏫 校园模式</a>
        <a class="active" href="/factory">🏭 工厂模式</a>
        <a href="/parking">🚗 停车场</a>
        <a href="/warehouse">📦 仓库模式</a>
        <a href="/home">🏠 家庭模式</a>
    </aside>

    <main class="main">
        <section class="hero">
            <div>
                <h1>🏭 工厂安全生产监控中心</h1>
                <p>安全帽检测、反光衣检测、吸烟检测、烟火预警、危险区域入侵</p>
            </div>
            <div class="mode-badge">当前模式：工厂</div>
        </section>

        <section class="dashboard-grid">
            <div class="video-panel">
                <div class="panel-title">
                    <h2>工厂实时监控</h2>
                    <span>LIVE CAMERA</span>
                </div>
                <div class="video-shell">
                    <img src="/video" class="video">
                </div>
            </div>

            <div class="side-panel">
                <div class="panel-title">
                    <h2>工厂模式功能</h2>
                    <span>FACTORY MODULES</span>
                </div>
                <div class="info-list">
                    <div><span>人员检测</span><b>已支持</b></div>
                    <div><span>危险区域</span><b>已支持</b></div>
                    <div><span>安全帽检测</span><b>预留</b></div>
                    <div><span>烟火检测</span><b>预留</b></div>
                    <div><span>吸烟检测</span><b>预留</b></div>
                </div>
                <div class="alert-box warning">⚠ 工厂安全模式已启用</div>
            </div>
        </section>
    </main>
</div>

</body>
</html>
